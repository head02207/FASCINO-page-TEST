<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FASCINO - 烘焙与咖啡</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <img src="FASnn.jpg" alt="FASCINO LOGO">
            </div>
            <ul class="nav-links">
                <li><a href="#home">首页</a></li>
                <li><a href="#about">关于</a></li>
                <li><a href="#services">服务</a></li>
                <li><a href="#contact">联系</a></li>
            </ul>
        </div>
    </nav>

    <!-- 首页 Hero 部分 -->
    <section id="home" class="hero">
        <div class="container">
            <div class="hero-content">
                <h1>欢迎来到 FASCINO</h1>
                <p>烘焙与咖啡的完美结合</p>
                <button class="cta-button">了解更多</button>
            </div>
        </div>
    </section>

    <!-- 关于部分 -->
    <section id="about" class="about">
        <div class="container">
            <div class="about-content">
                <div class="about-text">
                    <h2>关于我们</h2>
                    <p>FASCINO 烘焙与咖啡馆致力于提供最高质量的烘焙产品和精品咖啡。我们相信每一份烘焙都需要精心打磨，每一杯咖啡都值得尊重。</p>
                    <p>通过创新的食谱和热情的服务，我们为每位顾客创造难忘的美食体验。</p>
                </div>
                <div class="about-image">
                    <img src="FAM.jpg" alt="烘焙产品">
                </div>
            </div>
        </div>
    </section>

    <!-- 服务部分 -->
    <section id="services" class="services">
        <div class="container">
            <h2>我们的产品</h2>
            <div class="services-grid">
                <div class="service-card">
                    <div class="service-icon">🥐</div>
                    <h3>精选烘焙</h3>
                    <p>精心烘焙的面包、蛋糕和糕点，每天新鲜制作。</p>
                </div>
                <div class="service-card">
                    <div class="service-icon">☕</div>
                    <h3>精品咖啡</h3>
                    <p>采用精选咖啡豆，由专业咖啡师精心制作。</p>
                </div>
                <div class="service-card">
                    <div class="service-icon">🎂</div>
                    <h3>定制蛋糕</h3>
                    <p>为您的特殊时刻定制独特的蛋糕和甜品。</p>
                </div>
            </div>
        </div>
    </section>

    <!-- 联系部分 -->
    <section id="contact" class="contact">
        <div class="container">
            <h2>联系我们</h2>
            <form class="contact-form">
                <input type="text" placeholder="您的名字" required>
                <input type="email" placeholder="您的邮箱" required>
                <textarea placeholder="您的消息" rows="5" required></textarea>
                <button type="submit" class="submit-button">发送</button>
            </form>
        </div>
    </section>

    <!-- 页脚 -->
    <footer>
        <div class="container">
            <p>&copy; 2026 FASCINO Bakery & Cafe. 版权所有。</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
