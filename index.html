<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FASCINO - 我们的品牌</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">FASCINO</div>
            <ul class="nav-links">
                <li><a href="#home">首页</a></li>
                <li><a href="#about">关于</a></li>
                <li><a href="#services">服务</a></li>
                <li><a href="#contact">联系</a></li>
            </ul>
        </div>
    </nav>

    <!-- 首页 Hero 部分 -->
    <section id="home" class="hero">
        <div class="container">
            <div class="hero-content">
                <h1>欢迎来到 FASCINO</h1>
                <p>创造美好生活的品牌</p>
                <button class="cta-button">了解更多</button>
            </div>
        </div>
    </section>

    <!-- 关于部分 -->
    <section id="about" class="about">
        <div class="container">
            <div class="about-content">
                <div class="about-text">
                    <h2>关于我们</h2>
                    <p>FASCINO 是一个致力于创造优质产品和服务的品牌。我们相信每个细节都很重要，为客户提供最好的体验。</p>
                    <p>通过创新和热情，我们不断努力超越客户的期望。</p>
                </div>
                <div class="about-image">
                    <img src="https://via.placeholder.com/400x300?text=About+Image" alt="关于我们">
                </div>
            </div>
        </div>
    </section>

    <!-- 服务部分 -->
    <section id="services" class="services">
        <div class="container">
            <h2>我们的服务</h2>
            <div class="services-grid">
                <div class="service-card">
                    <div class="service-icon">🎯</div>
                    <h3>高质量</h3>
                    <p>我们提供最高质量的产品和服务。</p>
                </div>
                <div class="service-card">
                    <div class="service-icon">💡</div>
                    <h3>创新</h3>
                    <p>不断创新，引领行业发展。</p>
                </div>
                <div class="service-card">
                    <div class="service-icon">🤝</div>
                    <h3>客户至上</h3>
                    <p>客户满意是我们的目标。</p>
                </div>
            </div>
        </div>
    </section>

    <!-- 联系部分 -->
    <section id="contact" class="contact">
        <div class="container">
            <h2>联系我们</h2>
            <form class="contact-form">
                <input type="text" placeholder="您的名字" required>
                <input type="email" placeholder="您的邮箱" required>
                <textarea placeholder="您的消息" rows="5" required></textarea>
                <button type="submit" class="submit-button">发送</button>
            </form>
        </div>
    </section>

    <!-- 页脚 -->
    <footer>
        <div class="container">
            <p>&copy; 2026 FASCINO. 版权所有。</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
